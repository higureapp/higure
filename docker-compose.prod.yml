services:
    # Production MySQL with healthcheck and backup
    db:
        image: mysql:8.4
        container_name: higure-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
            MYSQL_DATABASE: ${DB_NAME}
            MYSQL_USER: ${DB_USER}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mysql_data:/var/lib/mysql
        ports:
            - '127.0.0.1:3306:3306'
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - higure-prod-network
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    # Production Redis with persistence and memory limits
    redis:
        image: redis:7-alpine
        container_name: higure-redis
        restart: always
        command: >
            redis-server
            --appendonly yes
            --maxmemory 256mb
            --maxmemory-policy allkeys-lru
            --stop-writes-on-bgsave-error yes
            --rdbcompression yes
        volumes:
            - redis_data:/data
        ports:
            - '127.0.0.1:6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - higure-prod-network
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

    # Production API service
    api:
        image: higure-api:${VERSION:-latest}
        container_name: higure-api
        restart: always
        environment:
            DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
            REDIS_URL: redis://redis:6379
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400000}
            GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
            PORT: 3000
            NODE_ENV: production
        ports:
            - '127.0.0.1:3000:3000'
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - higure-prod-network
        deploy:
            replicas: 2
            resources:
                limits:
                    cpus: '1'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M
            update_config:
                parallelism: 1
                delay: 10s
                order: start-first
            restart_policy:
                condition: on-failure
                delay: 10s
                max_attempts: 3

    # Production Web App
    www:
        image: higure-www:${VERSION:-latest}
        container_name: higure-www
        restart: always
        environment:
            NODE_ENV: production
        ports:
            - '127.0.0.1:80:80'
            - '127.0.0.1:443:443'
        depends_on:
            - api
        networks:
            - higure-prod-network
        deploy:
            replicas: 2
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    # Nginx reverse proxy
    nginx:
        image: nginx:alpine
        container_name: higure-nginx
        restart: always
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./nginx/ssl:/etc/nginx/ssl:ro
        ports:
            - '${HTTP_PORT:-80}:80'
            - '${HTTPS_PORT:-443}:443'
        depends_on:
            - api
            - www
        networks:
            - higure-prod-network
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 128M

volumes:
    mysql_data:
        driver: local
    redis_data:
        driver: local

networks:
    higure-prod-network:
        driver: bridge
