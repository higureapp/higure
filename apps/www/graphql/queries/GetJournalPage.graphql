query GetJournalPage($id: ID!) {
  journalPage(id: $id) {
    id
    date
    time
    location
    content
    mood
    isActive
    tags {
      id
      name
      color
    }
    metrics {
      wordCount
      sentenceCount
      averageSentenceLength
      paragraphCount
      textDensity
      estimatedWritingTime
      temporalReferencesCount
      temporalFocus
      emotionalValence
      emotionalIntensity
      emotionalVariability
      emotionalWordsCount
      introspectionIndex
      questionsCount
      causeEffectCount
      eventsCount
      charactersCount
      firstPersonUsage
      narrativeSequentiality
      lexicalRichness
      keyRepetitionsCount
      metaphorsCount
      formality
    }

    aiAnalysis {
      criticalAnalysis
      suggestedSongs {
        title
        artist
        reason
      }
      quote
      quoteAuthor
    }
  }
}