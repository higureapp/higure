fragment AnalysisFields on AnalysisModel {
  id
  journalPageId
  criticalAnalysis
  quote
  quoteAuthor
  generatedAt
  modelVersion
  suggestedSongs {
    spotifyUrl
    title
    album
    author
    minutes
    coverUrl
  }
  metrics {
    wordCount
    sentenceCount
    averageSentenceLength
    paragraphCount
    textDensity
    estimatedWritingTime
    temporalReferencesCount
    temporalFocus
    emotionalValence
    emotionalIntensity
    emotionalVariability
    emotionalWordsCount
    introspectionIndex
    questionsCount
    causeEffectCount
    eventsCount
    charactersCount
    firstPersonUsage
    narrativeSequentiality
    lexicalRichness
    keyRepetitionsCount
    metaphorsCount
    formality
  }
}